<style>
:root {
  --bg:             #ffffff;
  --bg-secondary:   #f5f5f5;
  --bg-tertiary:    #eeeeee;
  --border:         #e0e0e0;
  --border-dark:    #cccccc;
  --text:           #1a1a1a;
  --text-muted:     #666666;
  --text-small:     #888888;
  --accent:         #006db7;
  --accent-hover:   #005a96;
  --success:        #2e7d32;
  --success-bg:     #e8f5e9;
  --warning-text:   #e65100;
  --warning-bg:     #fff8e1;
  --error-text:     #c62828;
  --error-bg:       #ffebee;
  --amber:          #f59e0b;
  --red:            #dc2626;
  --retired:        #9e9e9e;
  --priority-1:     #c62828;
  --priority-2:     #e65100;
  --priority-3:     #f59e0b;
  --priority-4:     #2e7d32;
  --priority-5:     #1565c0;
  --font:           -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --radius:         4px;
  --nav-height:     52px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); font-size: 14px; color: var(--text); background: var(--bg); }
a { color: var(--accent); text-decoration: none; }
button { cursor: pointer; font-family: var(--font); }
input, select { font-family: var(--font); font-size: 14px; }
.hidden { display: none !important; }

#app-nav {
  position: fixed; top: 0; left: 0; right: 0; width: 100%; height: var(--nav-height);
  background: var(--text); color: white; display: flex; flex-direction: row;
  justify-content: space-between; align-items: center; padding: 0 16px; z-index: 50;
}
#nav-brand { font-weight: 700; font-size: 16px; letter-spacing: 0.5px; color: white; }
#nav-links { display: flex; flex-direction: row; gap: 4px; }
.nav-link { padding: 6px 12px; border-radius: var(--radius); color: white; text-decoration: none; }
.nav-link:hover { background: rgba(255,255,255,0.15); }
.nav-link.active { background: rgba(255,255,255,0.25); font-weight: 600; }
#nav-stats { display: flex; flex-direction: row; gap: 12px; font-size: 13px; color: rgba(255,255,255,0.75); }

.page { padding-top: calc(var(--nav-height) + 12px); padding-left: 16px; padding-right: 16px; max-width: 1400px; margin: 0 auto; }

#retirement-strip {
  background: var(--warning-bg); border-bottom: 1px solid #ffe0b2; padding: 8px 16px;
  font-size: 13px; color: var(--warning-text); position: sticky; top: var(--nav-height); z-index: 10;
}
.strip-label { font-weight: 600; margin-right: 8px; }

#toolbar { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 0; align-items: center; }
#toolbar input, #toolbar select {
  height: 34px; padding: 0 8px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg); color: var(--text);
}
#filter-search { flex: 1; min-width: 200px; }
#toolbar select { min-width: 130px; }
#sort-direction {
  width: 34px; height: 34px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg); font-size: 16px;
}
#view-toggle { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.view-btn { padding: 0 12px; height: 34px; border: none; background: var(--bg); color: var(--text-muted); }
.view-btn.active { background: var(--accent); color: white; }
#results-count { font-size: 13px; color: var(--text-muted); padding-bottom: 8px; }

#view-card { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; padding-bottom: 32px; }
.set-card { border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); overflow: hidden; display: flex; flex-direction: column; }
.card-image { width: 100%; aspect-ratio: 4/3; object-fit: contain; background: var(--bg-secondary); }
.card-image-placeholder { width: 100%; aspect-ratio: 4/3; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; color: var(--text-small); font-size: 12px; }
.card-body { padding: 10px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
.card-set-id { font-size: 11px; color: var(--text-small); }
.card-set-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
.card-meta { font-size: 12px; color: var(--text-muted); }
.card-pricing { display: flex; gap: 12px; align-items: baseline; margin-top: 4px; }
.card-rrp { font-size: 12px; color: var(--text-muted); }
.card-target { font-size: 14px; font-weight: 600; }
.card-target.price-overridden { color: var(--amber); }
.card-target.price-no-rrp { color: var(--text-muted); }
.card-retirement { font-size: 12px; margin-top: 2px; }
.card-retirement.retiring-red { color: var(--red); font-weight: 600; }
.card-retirement.retiring-amber { color: var(--amber); font-weight: 600; }
.card-retirement.retired { color: var(--retired); text-decoration: line-through; }
.card-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.badge-priority { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 11px; font-weight: 600; color: white; }
.badge-owned { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 11px; background: var(--success-bg); color: var(--success); }
.card-reason { font-size: 12px; color: var(--text-muted); font-style: italic; margin-top: 4px; }
.card-edit-toggle { margin-top: 8px; font-size: 12px; color: var(--accent); cursor: pointer; background: none; border: none; padding: 0; text-align: left; }
.card-edit-panel { border-top: 1px solid var(--border); margin-top: 8px; padding-top: 8px; display: flex; flex-direction: column; gap: 8px; }

#view-table { overflow-x: auto; padding-bottom: 32px; }
#sets-table { width: 100%; border-collapse: collapse; font-size: 13px; }
#sets-table th { text-align: left; padding: 8px 10px; background: var(--bg-secondary); border-bottom: 2px solid var(--border-dark); font-weight: 600; white-space: nowrap; color: var(--text-muted); font-size: 12px; }
#sets-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
#sets-table tr:hover td { background: var(--bg-secondary); }
.table-thumb { width: 40px; height: 40px; object-fit: contain; background: var(--bg-secondary); border-radius: var(--radius); }
.table-set-id { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
.table-set-name { font-weight: 500; min-width: 180px; }
td.retiring-red { color: var(--red); font-weight: 600; }
td.retiring-amber { color: var(--amber); font-weight: 600; }
td.retired { color: var(--retired); text-decoration: line-through; }
td.price-overridden { color: var(--amber); font-weight: 600; }
td.price-no-rrp { color: var(--text-muted); }
td.owned-positive { font-weight: 700; }
.table-expand-row td { background: var(--bg-secondary); padding: 12px 16px; }

.edit-panel { display: flex; flex-direction: column; gap: 8px; }
.edit-field { display: flex; flex-direction: column; gap: 3px; }
.edit-field label { font-size: 12px; color: var(--text-muted); font-weight: 600; }
.edit-field input, .edit-field select { height: 30px; padding: 0 8px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; width: 100%; }
.edit-feedback { font-size: 12px; height: 16px; }
.edit-feedback.saved { color: var(--success); }
.edit-feedback.error { color: var(--error-text); }

#summary-content { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding-bottom: 32px; }
.summary-block { border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; background: var(--bg); }
.summary-block h2 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.summary-stat { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px solid var(--border); }
.summary-stat:last-child { border-bottom: none; }
.stat-label { font-size: 13px; color: var(--text-muted); }
.stat-value { font-size: 15px; font-weight: 600; }
.summary-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.summary-table th { text-align: left; padding: 4px 0; font-size: 12px; color: var(--text-muted); font-weight: 600; }
.summary-table td { padding: 5px 0; border-bottom: 1px solid var(--border); }
.summary-table tr:last-child td { border-bottom: none; }
.priority-bar-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
.priority-label { width: 80px; font-size: 13px; }
.priority-bar-track { flex: 1; height: 8px; background: var(--bg-tertiary); border-radius: 4px; overflow: hidden; }
.priority-bar-fill { height: 100%; border-radius: 4px; }
.priority-count { font-size: 12px; color: var(--text-muted); width: 30px; text-align: right; }

#loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
#loading-message { color: var(--text-muted); font-size: 15px; }
#empty-state { padding: 48px 16px; text-align: center; color: var(--text-muted); }

/* Add Page Styles */
.btn-nav-add { background: var(--success); font-weight: 600; border: 1px solid rgba(255,255,255,0.2); }
.btn-nav-add:hover { background: #1b5e20 !important; }

.add-container { max-width: 800px; margin: 0 auto; background: var(--bg); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); }
.add-container h2 { margin-bottom: 20px; font-size: 18px; color: var(--text); }
.add-search-box { display: flex; gap: 8px; margin-bottom: 24px; }
.add-search-box input { flex: 1; padding: 12px; font-size: 15px; border: 1px solid var(--border); border-radius: var(--radius); }
.add-search-box input:focus { outline: none; border-color: var(--accent); }

#add-results { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 24px; }
.add-result-row { display: flex; gap: 16px; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; align-items: center; background: var(--bg); }
.add-result-row:hover { background: var(--bg-secondary); border-color: var(--border-dark); }
.add-result-thumb { width: 60px; height: 60px; object-fit: contain; background: var(--bg-secondary); border-radius: 4px; }

.add-split-view { display: flex; gap: 40px; margin-top: 16px; flex-wrap: wrap; }
.add-split-left { flex: 1; min-width: 250px; text-align: center; }
.add-split-right { flex: 1.5; min-width: 300px; display: flex; flex-direction: column; gap: 16px; background: var(--bg-secondary); padding: 20px; border-radius: var(--radius); }
.add-split-right h3 { font-size: 15px; margin-bottom: 8px; border-bottom: 1px solid var(--border-dark); padding-bottom: 8px; }

.add-image-container { width: 100%; aspect-ratio: 4/3; background: var(--bg-secondary); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--border); }
.add-image-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

.add-form-actions { display: flex; gap: 12px; margin-top: 8px; }

/* Delete Button Styles */
.btn-delete-set {
  width: 100%;
  padding: 8px;
  margin-top: 12px;
  background-color: var(--bg);
  color: var(--error-text);
  border: 1px solid #ffcdd2;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  transition: background-color 0.2s;
}
.btn-delete-set:hover:not(:disabled) {
  background-color: var(--error-bg);
}
.btn-delete-set:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
</style>
