
<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; padding: 12px; color: #202124; }
    h2 { margin: 0 0 10px 0; font-size: 16px; }
    h3 { margin: 12px 0 6px 0; font-size: 14px; }
    input[type="text"], select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #dfe1e5; border-radius: 4px; }
    button { padding: 8px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; }
    button.primary { background: #1a73e8; color: #fff; }
    button.secondary { background: #f1f3f4; color: #202124; border: 1px solid #dfe1e5; }
    .controls { display: grid; grid-template-columns: 1fr 120px; gap: 8px; margin-bottom: 8px; }
    .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .results { margin-top: 10px; max-height: 360px; overflow-y: auto; }
    .result { display: flex; align-items: center; gap: 10px; border: 1px solid #e0e0e0; padding: 8px; border-radius: 6px; margin-bottom: 8px; background: #fff; }
    .thumb { width: 80px; height: 80px; flex: 0 0 80px; display: flex; align-items: center; justify-content: center; background: #fafafa; border-radius: 4px; overflow: hidden; }
    .thumb img { max-width: 100%; max-height: 100%; display: block; }
    .meta { flex: 1; }
    .meta .title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .meta .sub { font-size: 12px; color: #5f6368; margin-bottom: 6px; }
    .actions { width: 110px; text-align: right; }
    .pager { display:flex; gap:8px; justify-content:center; align-items:center; margin-top: 8px; }
    .pager button { padding:6px 10px; border-radius:4px; border:1px solid #dfe1e5; background:#fff; cursor:pointer; }
    .pager .info { font-size:12px; color:#5f6368; }
    .status { font-size:13px; color:#1a73e8; margin-top:8px; }
    .log { margin-top:8px; background:#111; color:#dfe1e5; padding:8px; border-radius:4px; max-height:160px; overflow:auto; font-family: monospace; font-size:12px; }
    .small { font-size:12px; color:#5f6368; }
  </style>
</head>
<body>

<h2>Search LEGO Sets</h2>

<div class="controls">
  <input id="query" type="text" placeholder="Search by set number or name">
  <button class="primary" id="searchBtn">Search</button>
</div>

<div class="filters">
  <select id="theme"><option value="">Filter by Theme</option></select>
  <select id="year"><option value="">Filter by Year</option></select>
</div>

<h3>Cache Builder</h3>
<div style="display:grid; grid-template-columns: 1fr 120px; gap:8px; margin-bottom:8px;">
  <select id="cacheYear"><option value="">Select Year</option></select>
  <button class="secondary" id="buildBtn">Build Cache</button>
</div>

<div class="status" id="status">Idle</div>
<div style="display:flex; gap:8px; margin-top:8px;">
  <button class="secondary" id="showLogBtn">Show Log</button>
  <button class="secondary" id="clearLogBtn">Clear Log</button>
</div>
<div class="log" id="logWindow"></div>

<h3>Sync LEGO.com Wishlists</h3>
<div style="margin-bottom:12px;">
  <button class="secondary" id="syncBtn">Sync All Wishlists</button>
</div>

<div class="results" id="results"></div>

<div class="pager" id="pager" style="display:none;">
  <button id="prevBtn" class="secondary">Prev</button>
  <div class="info" id="pageInfo">Page 1 of 1</div>
  <button id="nextBtn" class="secondary">Next</button>
</div>

<script>
  let currentPage = 1;
  let totalPages = 1;
  let polling = false;

  // Populate theme dropdown
  google.script.run.withSuccessHandler(populateThemes).getThemeList();

  function populateThemes(list) {
    const sel = document.getElementById('theme');
    sel.innerHTML = '<option value="">Filter by Theme</option>';
    list.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.id;
      opt.textContent = t.name;
      sel.appendChild(opt);
    });
  }

  // Populate cache year dropdown (1980..current)
  const cacheYearSel = document.getElementById('cacheYear');
  const currentYear = new Date().getFullYear();
  for (let y = currentYear; y >= 1980; y--) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    cacheYearSel.appendChild(opt);
  }

  // Event bindings
  document.getElementById('searchBtn').addEventListener('click', () => { currentPage = 1; runSearch(); });
  document.getElementById('prevBtn').addEventListener('click', () => { if (currentPage>1){ currentPage--; runSearch(); }});
  document.getElementById('nextBtn').addEventListener('click', () => { if (currentPage<totalPages){ currentPage++; runSearch(); }});
  document.getElementById('query').addEventListener('keydown', function(e){ if (e.key==='Enter'){ e.preventDefault(); currentPage=1; runSearch(); }});

  document.getElementById('buildBtn').addEventListener('click', () => startCache());
  document.getElementById('showLogBtn').addEventListener('click', () => fetchLog());
  document.getElementById('clearLogBtn').addEventListener('click', () => { document.getElementById('logWindow').innerText=''; });
  document.getElementById('syncBtn').addEventListener('click', () => { document.getElementById('status').innerText='Syncing wishlists...'; google.script.run.withSuccessHandler(()=>{ document.getElementById('status').innerText='Wishlists synced'; }).syncAllWishlists(); });

  // Search
  function runSearch() {
    const q = document.getElementById('query').value.trim();
    const theme = document.getElementById('theme').value;
    const year = document.getElementById('year').value;
    const btn = document.getElementById('searchBtn');
    btn.disabled = true; btn.textContent = 'Searching...';
    google.script.run.withSuccessHandler(handleResults).searchLocalCache(q, theme, year, currentPage);
  }

  function handleResults(payload) {
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '';
    const btn = document.getElementById('searchBtn'); btn.disabled = false; btn.textContent = 'Search';

    if (!payload || !payload.results || payload.results.length === 0) {
      resultsDiv.innerHTML = '<div class="small">No results (build cache for relevant years first)</div>';
      document.getElementById('pager').style.display = 'none';
      return;
    }

    // Populate year filter from results
    const years = Array.from(new Set(payload.results.map(r => r.year).filter(Boolean))).sort((a,b)=>b-a);
    const yearSel = document.getElementById('year');
    yearSel.innerHTML = '<option value="">Filter by Year</option>';
    years.forEach(y => { const opt=document.createElement('option'); opt.value=y; opt.textContent=y; yearSel.appendChild(opt); });

    payload.results.forEach(s => {
      const el = document.createElement('div'); el.className='result';
      const thumb = document.createElement('div'); thumb.className='thumb';
      if (s.img) { const img=document.createElement('img'); img.src=s.img; img.alt=s.name; thumb.appendChild(img); } else { thumb.textContent='No image'; thumb.style.color='#777'; thumb.style.fontSize='12px'; }
      const meta = document.createElement('div'); meta.className='meta';
      meta.innerHTML = `<div class="title">${s.set_num} — ${s.name}</div><div class="sub">Year: ${s.year || 'N/A'}</div>`;
      const actions = document.createElement('div'); actions.className='actions';
      const addBtn = document.createElement('button'); addBtn.className='primary'; addBtn.textContent='Add to Sheet'; addBtn.style.width='100%';
      addBtn.onclick = () => { google.script.run.withSuccessHandler(()=>{ alert('Set added to sheet'); }).insertSetIntoSheet(s.set_num); };
      actions.appendChild(addBtn);
      el.appendChild(thumb); el.appendChild(meta); el.appendChild(actions);
      resultsDiv.appendChild(el);
    });

    currentPage = payload.page || 1;
    totalPages = payload.totalPages || 1;
    document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
    document.getElementById('pager').style.display = (totalPages>1) ? 'flex' : 'none';
  }

  /* ------------------------------
     Cache: start + polling + log
     ------------------------------ */
  function startCache() {
    const year = document.getElementById('cacheYear').value;
    if (!year) { alert('Please select a year'); return; }
    document.getElementById('status').innerText = `Starting cache for ${year}...`;
    document.getElementById('logWindow').innerText = '';
    google.script.run.withSuccessHandler(function(res){
      appendLog(res.log || []);
      document.getElementById('status').innerText = res.message || 'Started';
      // begin polling
      if (!polling) pollCache();
    }).cacheYearWithProgress(year);
  }

  function pollCache() {
    polling = true;
    google.script.run.withSuccessHandler(function(res){
      appendLog(res.log || []);
      document.getElementById('status').innerText = res.message || '';
      if (!res.done) {
        // continue polling after short delay
        setTimeout(pollCache, 600);
      } else {
        polling = false;
        document.getElementById('status').innerText = res.message || 'DONE';
      }
    }).cacheYearContinue();
  }

  function appendLog(lines) {
    const win = document.getElementById('logWindow');
    if (!lines || !lines.length) return;
    lines.forEach(l => {
      const node = document.createElement('div');
      node.textContent = `[${new Date().toLocaleTimeString()}] ${l}`;
      win.appendChild(node);
    });
    win.scrollTop = win.scrollHeight;
  }

  function fetchLog() {
    google.script.run.withSuccessHandler(function(lines){
      const win = document.getElementById('logWindow');
      win.innerHTML = '';
      (lines || []).forEach(l => {
        const node = document.createElement('div');
        node.textContent = `[${new Date().toLocaleTimeString()}] ${l}`;
        win.appendChild(node);
      });
      win.scrollTop = win.scrollHeight;
    }).getCacheLog(500);
  }

</script>
</body>
</html>
